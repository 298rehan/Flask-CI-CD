{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
  <div class="text-center py-5">
    <div class="error-code fw-bold text-primary">404</div>
    <h1 class="h3 fw-bold mt-2">Page not found</h1>
    <p class="text-muted col-lg-6 mx-auto">
      The page you're looking for doesn't exist, may have been moved,
      or the note you requested could not be found.
    </p>
    <div class="d-flex justify-content-center gap-2 mt-3">
      <a href="{{ url_for('index') }}" class="btn btn-primary">
        <i class="bi bi-house-door me-1"></i>Go Home
      </a>
      <a href="{{ url_for('notes') }}" class="btn btn-outline-secondary">
        <i class="bi bi-card-list me-1"></i>View Notes
      </a>
    </div>
  </div>
{% endblock %}
